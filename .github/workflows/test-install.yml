name: Test install

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        tier: [0, 1, 2, 3, 4]
        # Tier 5 (Ollama) skipped in CI — too big to download per run

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install jq

      - name: Test install
        run: |
          ./scripts/install.sh --tier=${{ matrix.tier }} --mode=fresh --skip-requirements

      - name: Test verify
        run: |
          ./scripts/verify.sh --tier=${{ matrix.tier }} --skip-requirements

  unit-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install jq
          # expect ships with the macOS runner image — used by the
          # interactive merger test; it skips cleanly if absent.

      - name: Run stack test suite
        run: |
          fail=0
          for t in tests/test-*.sh; do
            echo "=== $t ==="
            bash "$t" || fail=1
          done
          exit $fail
